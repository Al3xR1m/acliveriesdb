<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Creator Dashboard — AC Liveries DB</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,400;0,14..32,500;0,14..32,700;0,14..32,900;1,14..32,700;1,14..32,900&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#07070A;--s1:#0E0E13;--s2:#141419;
  --b1:rgba(255,255,255,0.05);--b2:rgba(255,255,255,0.09);
  --t1:#F5F5F7;--t2:#6E6E73;--t3:#38383D;
  --acc:#5B6EF7;--acc2:rgba(91,110,247,0.12);
  --grn:#30D158;--grn2:rgba(48,209,88,0.10);
  --amb:#FF9F0A;--amb2:rgba(255,159,10,0.10);
  --red:#FF453A;--red2:rgba(255,69,58,0.10);
}
html,body{background:var(--bg);color:var(--t1);font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased;min-height:100vh;}

/* GATE */
.gate{display:flex;align-items:center;justify-content:center;height:100vh;}
.gate-box{background:var(--s1);border:0.5px solid var(--b1);border-radius:18px;padding:40px;width:100%;max-width:400px;text-align:center;}

/* SHELL */
.shell{display:grid;grid-template-columns:220px 1fr;min-height:100vh;}

/* SIDEBAR */
.sidebar{background:var(--s1);border-right:0.5px solid var(--b1);display:flex;flex-direction:column;height:100vh;position:sticky;top:0;}
.sb-logo{padding:20px;border-bottom:0.5px solid var(--b1);}
.sb-artist{padding:14px 20px;border-bottom:0.5px solid var(--b1);display:flex;align-items:center;gap:10px;}
.sb-av{width:36px;height:36px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;overflow:hidden;background:var(--acc2);color:var(--acc);}
.sb-av img{width:100%;height:100%;object-fit:cover;}
.sb-nav{padding:10px;flex:1;}
.sb-sec{font-size:9px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.8px;padding:10px 10px 4px;}
.sb-link{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:9px;cursor:pointer;font-size:13px;font-weight:500;color:var(--t2);transition:all .12s;border:none;background:none;font-family:inherit;width:100%;text-align:left;}
.sb-link:hover{color:var(--t1);background:var(--b1);}
.sb-link.on{color:var(--t1);background:var(--acc2);}
.sb-link.on i{color:var(--acc);}
.sb-link i{font-size:16px;flex-shrink:0;color:var(--t3);}
.sb-back{display:flex;align-items:center;gap:7px;margin:10px;padding:10px;border:0.5px solid var(--b1);border-radius:10px;font-size:12px;font-weight:600;color:var(--t2);cursor:pointer;text-decoration:none;font-family:inherit;background:transparent;}
.sb-back:hover{color:var(--t1);}

/* MAIN */
.main{min-height:100vh;overflow-y:auto;}
.view{display:none;}
.view.on{display:block;}
.page-top{padding:28px 28px 20px;border-bottom:0.5px solid var(--b1);}
.page-ey{font-size:9px;font-weight:700;color:var(--acc);letter-spacing:.8px;text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;gap:8px;}
.page-ey span{width:18px;height:1px;background:var(--acc);display:inline-block;}
.page-h1{font-size:36px;font-weight:900;font-style:italic;letter-spacing:-2px;color:var(--t1);}
.page-h1 em{color:var(--acc);}

/* CARDS GRID */
.lv-grid{padding:20px 28px 40px;display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px;}
.lv-card{background:var(--s1);border:0.5px solid var(--b1);border-radius:14px;overflow:hidden;transition:all .2s;}
.lv-card:hover{transform:translateY(-2px);border-color:var(--b2);}
.lv-thumb{width:100%;aspect-ratio:16/9;position:relative;overflow:hidden;background:var(--s2);display:flex;align-items:center;justify-content:center;}
.lv-thumb img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0;}
.lv-ov{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.7),transparent 55%);pointer-events:none;}
.lv-badges{position:absolute;top:8px;left:8px;display:flex;gap:4px;}
.lv-num{position:absolute;bottom:8px;left:10px;font-size:26px;font-weight:900;font-style:italic;color:#fff;letter-spacing:-1.5px;line-height:1;}
.lv-body{padding:10px 12px 12px;}
.lv-name{font-size:13px;font-weight:700;font-style:italic;letter-spacing:-.3px;color:var(--t1);margin-bottom:6px;}
.lv-foot{display:flex;align-items:center;justify-content:space-between;padding-top:8px;border-top:0.5px solid var(--b1);}
.badge{font-size:9px;font-weight:700;padding:2px 7px;border-radius:4px;letter-spacing:.3px;text-transform:uppercase;}
.b-f{background:var(--grn2);color:var(--grn);}
.b-p{background:var(--amb2);color:var(--amb);}
.b-n{background:rgba(191,90,242,.12);color:#BF5AF2;}

/* FORM */
.form-wrap{padding:24px 28px 60px;max-width:700px;}
.field{display:flex;flex-direction:column;gap:5px;margin-bottom:14px;}
.field label{font-size:10px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.05em;}
.field input,.field select,.field textarea{background:var(--s1);border:0.5px solid var(--b1);border-radius:9px;padding:9px 12px;color:var(--t1);font-size:13px;outline:none;font-family:inherit;transition:border-color .12s;}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--acc);}
.field select{appearance:none;cursor:pointer;}
.field textarea{resize:vertical;min-height:72px;line-height:1.5;}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.field.full{grid-column:1/-1;}
.btn-primary{height:40px;padding:0 20px;background:var(--acc);color:#fff;border:none;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;display:inline-flex;align-items:center;gap:7px;}
.btn-primary:hover{opacity:.88;}
.btn-ghost{height:36px;padding:0 14px;background:transparent;color:var(--t2);border:0.5px solid var(--b1);border-radius:9px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;display:inline-flex;align-items:center;gap:6px;}
.btn-ghost:hover{color:var(--t1);}
.btn-danger{height:36px;padding:0 14px;background:var(--red2);color:var(--red);border:0.5px solid rgba(255,69,58,.25);border-radius:9px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;display:inline-flex;align-items:center;gap:6px;}

/* MODAL */
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:none;align-items:center;justify-content:center;padding:20px;}
.modal-ov.open{display:flex;}
.modal{background:var(--s1);border:0.5px solid var(--b2);border-radius:16px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;padding:24px;}
.modal-title{font-size:17px;font-weight:700;font-style:italic;letter-spacing:-.5px;margin-bottom:18px;}
.modal-foot{display:flex;gap:8px;justify-content:flex-end;margin-top:16px;padding-top:16px;border-top:0.5px solid var(--b1);}

/* TOAST */
.toast{position:fixed;bottom:24px;right:24px;padding:11px 16px;border-radius:10px;font-size:13px;font-weight:600;z-index:300;display:none;align-items:center;gap:8px;}
.toast.ok{background:var(--grn2);color:var(--grn);border:0.5px solid rgba(48,209,88,.3);}
.toast.err{background:var(--red2);color:var(--red);border:0.5px solid rgba(255,69,58,.3);}

/* BRAND BUTTONS */
.brand-btn{padding:14px 16px;border-radius:12px;border:1.5px solid var(--b1);background:transparent;cursor:pointer;text-align:left;font-family:inherit;color:var(--t3);width:100%;}
.brand-btn.rss.on{border-color:rgba(232,49,42,.4);background:rgba(232,49,42,.10);color:#E8312A;}
.brand-btn.vrc.on{border-color:rgba(48,209,88,.3);background:rgba(48,209,88,.08);color:#30D158;}
.brand-btn.urd.on{border-color:rgba(255,159,10,.3);background:rgba(255,159,10,.08);color:#FF9F0A;}
</style>
</head>
<body>

<div class="gate" id="ae-gate">
  <div class="gate-box">
    <i class="ti ti-lock" style="font-size:32px;color:var(--t3);display:block;margin-bottom:16px;"></i>
    <div style="font-size:22px;font-weight:900;font-style:italic;letter-spacing:-1px;margin-bottom:8px;"><em style="color:var(--acc);">AC</em> Liveries DB</div>
    <p style="font-size:13px;color:var(--t2);line-height:1.6;">Access via your personal link.<br>Ask the admin on Discord.</p>
  </div>
</div>

<div class="shell" id="ae-shell" style="display:none;">
  <aside class="sidebar">
    <div class="sb-logo">
      <span style="font-size:15px;font-weight:900;font-style:italic;color:var(--acc);">AC</span>
      <span style="font-size:15px;font-weight:900;font-style:italic;color:var(--t1);"> Liveries</span>
      <span style="font-size:8px;font-weight:700;color:var(--t3);letter-spacing:1.2px;text-transform:uppercase;margin-left:4px;">DB</span>
    </div>
    <div class="sb-artist">
      <div class="sb-av" id="ae-av">?</div>
      <div style="min-width:0;">
        <div style="font-size:13px;font-weight:700;color:var(--t1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;" id="ae-name">…</div>
        <div style="font-size:10px;color:var(--t3);">👑 Confirmed artist</div>
      </div>
    </div>
    <nav class="sb-nav">
      <div class="sb-sec">My content</div>
      <button class="sb-link on" id="nl-liveries"><i class="ti ti-photo"></i> My liveries</button>
      <button class="sb-link" id="nl-addons"><i class="ti ti-puzzle"></i> My addons</button>
      <button class="sb-link" id="nl-submit"><i class="ti ti-plus"></i> Add livery</button>
      <button class="sb-link" id="nl-profile"><i class="ti ti-user"></i> My profile</button>
    </nav>
    <a href="index.html" class="sb-back"><i class="ti ti-arrow-left"></i> Back to site</a>
  </aside>

  <div class="main">

    <!-- MY LIVERIES -->
    <div class="view on" id="ae-view-liveries">
      <div class="page-top">
        <div class="page-ey"><span></span>Creator Dashboard</div>
        <h2 class="page-h1">My <em>liveries</em></h2>
      </div>
      <div class="lv-grid" id="ae-liveries-grid"></div>
    </div>

    <!-- MY ADDONS -->
    <div class="view" id="ae-view-addons">
      <div class="page-top">
        <div class="page-ey"><span></span>Creator Dashboard</div>
        <h2 class="page-h1">My <em>addons</em></h2>
      </div>
      <div class="lv-grid" id="ae-addons-grid"></div>
    </div>

    <!-- ADD LIVERY -->
    <div class="view" id="ae-view-submit">
      <div class="page-top">
        <div class="page-ey"><span></span>Creator Dashboard</div>
        <h2 class="page-h1">Add a <em>livery</em></h2>
      </div>
      <div class="form-wrap">
        <!-- Publisher -->
        <div style="margin-bottom:20px;">
          <div style="font-size:10px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px;">Publisher</div>
          <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;" id="ae-brand-btns">
            <button class="brand-btn rss on" data-brand="RSS"><div style="font-size:16px;font-weight:900;font-style:italic;">RSS</div><div style="font-size:10px;margin-top:2px;">Race Sim Studio</div></button>
            <button class="brand-btn vrc" data-brand="VRC"><div style="font-size:16px;font-weight:900;font-style:italic;">VRC</div><div style="font-size:10px;margin-top:2px;">Virtual Racing Cars</div></button>
            <button class="brand-btn urd" data-brand="URD"><div style="font-size:16px;font-weight:900;font-style:italic;">URD</div><div style="font-size:10px;margin-top:2px;">United Racing Design</div></button>
          </div>
          <input type="hidden" id="ae-brand" value="RSS">
        </div>
        <!-- Form -->
        <div class="form-grid">
          <div class="field full"><label>Livery name *</label><input id="ae-lname" type="text" placeholder="e.g. Ferrari SF-24 2024"></div>
          <div class="field"><label>Category</label><select id="ae-cat"><option value="">Select…</option></select></div>
          <div class="field"><label>Mod</label><select id="ae-mod"><option value="">Select…</option></select></div>
          <div class="field full"><label>Championship</label><select id="ae-champ"><option value="">None</option></select></div>
          <div class="field"><label>Team</label><input id="ae-team" type="text" placeholder="e.g. Scuderia Ferrari"></div>
          <div class="field"><label>Driver(s)</label><input id="ae-driver" type="text" placeholder="e.g. Charles Leclerc"></div>
          <div class="field"><label>Season</label><input id="ae-season" type="text" placeholder="e.g. 2024"></div>
          <div class="field"><label>Car number</label><input id="ae-carnumber" type="text" placeholder="e.g. 16" maxlength="4"></div>
          <div class="field full"><label>Download URL *</label><input id="ae-url" type="url" placeholder="https://www.racedepartment.com/…"></div>
          <div class="field full"><label>Preview image URL</label><input id="ae-img" type="url" placeholder="https://…"></div>
          <div class="field"><label>Pricing</label><select id="ae-paid"><option value="false">Free</option><option value="true">Paid</option></select></div>
          <div class="field"><label>Notes</label><input id="ae-notes" type="text" placeholder="Optional"></div>
        </div>
        <div style="display:flex;gap:8px;margin-top:6px;">
          <button class="btn-primary" id="ae-submit-btn"><i class="ti ti-send"></i> Publish livery</button>
        </div>
        <div id="ae-submit-err" style="color:var(--red);font-size:12px;margin-top:8px;display:none;"></div>
      </div>
    </div>

    <!-- MY PROFILE -->
    <div class="view" id="ae-view-profile">
      <div class="page-top">
        <div class="page-ey"><span></span>Creator Dashboard</div>
        <h2 class="page-h1">My <em>profile</em></h2>
      </div>
      <div class="form-wrap">
        <div class="field"><label>Name *</label><input id="pf-name" type="text"></div>
        <div class="field"><label>Discord</label><input id="pf-discord" type="text" placeholder="@username"></div>
        <div class="field"><label>Bio</label><textarea id="pf-bio" placeholder="Tell the community about yourself…"></textarea></div>
        <div style="font-size:10px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px;">Social links</div>
        <div class="field"><label>Twitter/X</label><input id="pf-twitter" type="url" placeholder="https://x.com/…"></div>
        <div class="field"><label>Patreon</label><input id="pf-patreon" type="url" placeholder="https://patreon.com/…"></div>
        <div class="field"><label>YouTube</label><input id="pf-youtube" type="url" placeholder="https://youtube.com/…"></div>
        <div class="field"><label>Overtake</label><input id="pf-overtake" type="url" placeholder="https://www.overtake.gg/…"></div>
        <button class="btn-primary" id="pf-save"><i class="ti ti-check"></i> Save profile</button>
      </div>
    </div>

  </div>
</div>

<!-- EDIT LIVERY MODAL -->
<div class="modal-ov" id="ae-lm-ov">
  <div class="modal">
    <div class="modal-title"><i class="ti ti-pencil" style="color:var(--acc);"></i> Edit livery</div>
    <div class="form-grid">
      <div class="field full"><label>Name *</label><input id="ae-lm-name"></div>
      <div class="field"><label>Team</label><input id="ae-lm-team"></div>
      <div class="field"><label>Driver(s)</label><input id="ae-lm-driver"></div>
      <div class="field"><label>Season</label><input id="ae-lm-season"></div>
      <div class="field"><label>Car #</label><input id="ae-lm-car" maxlength="4"></div>
      <div class="field"><label>Pricing</label><select id="ae-lm-paid"><option value="false">Free</option><option value="true">Paid</option></select></div>
      <div class="field full"><label>Notes</label><textarea id="ae-lm-notes"></textarea></div>
    </div>
    <div class="modal-foot">
      <button class="btn-ghost" id="ae-lm-cancel">Cancel</button>
      <button class="btn-danger" id="ae-lm-delete"><i class="ti ti-trash"></i> Delete</button>
      <button class="btn-primary" id="ae-lm-save"><i class="ti ti-check"></i> Save</button>
    </div>
  </div>
</div>

<div class="toast" id="ae-toast"></div>

<script>
var _ae_token = new URLSearchParams(location.search).get('token');
var _ae_artist = null;
var _ae_edit_id = null;
var _ae_brand = 'RSS';
var _cats = [], _mods = [], _champs = [];

function aeToast(msg, type) {
  var t = document.getElementById('ae-toast');
  t.textContent = msg; t.className = 'toast ' + (type||'ok'); t.style.display = 'flex';
  setTimeout(function(){ t.style.display='none'; }, 3000);
}

function aeNav(v) {
  document.querySelectorAll('.view').forEach(function(x){ x.classList.remove('on'); });
  document.querySelectorAll('.sb-link').forEach(function(x){ x.classList.remove('on'); });
  document.getElementById('ae-view-'+v).classList.add('on');
  document.getElementById('nl-'+v).classList.add('on');
  if (v==='liveries') aeLiveries();
  if (v==='addons') aeAddons();
  if (v==='profile') aeProfile();
  if (v==='submit') aeInitSubmit();
}

document.getElementById('nl-liveries').addEventListener('click', function(){ aeNav('liveries'); });
document.getElementById('nl-addons').addEventListener('click', function(){ aeNav('addons'); });
document.getElementById('nl-submit').addEventListener('click', function(){ aeNav('submit'); });
document.getElementById('nl-profile').addEventListener('click', function(){ aeNav('profile'); });

// Brand selector
document.getElementById('ae-brand-btns').addEventListener('click', function(e) {
  var btn = e.target.closest('.brand-btn');
  if (!btn) return;
  _ae_brand = btn.dataset.brand;
  document.getElementById('ae-brand').value = _ae_brand;
  document.querySelectorAll('.brand-btn').forEach(function(b){ b.classList.remove('on'); });
  btn.classList.add('on');
  aeFilterCats();
});

function aeFilterCats() {
  var sel = document.getElementById('ae-cat');
  sel.innerHTML = '<option value="">Select…</option>';
  _cats.filter(function(c){ return c.brand === _ae_brand; }).forEach(function(c){
    var o = document.createElement('option'); o.value = c.id; o.textContent = c.name; sel.appendChild(o);
  });
  // Reset mod/champ
  var ms = document.getElementById('ae-mod');
  ms.innerHTML = '<option value="">Select…</option>';
  _mods.filter(function(m){ return m.brand === _ae_brand; }).forEach(function(m){
    var o = document.createElement('option'); o.value = m.id; o.textContent = m.name; ms.appendChild(o);
  });
}

async function aeBoot() {
  if (!_ae_token) return;
  var res = await db.from('artists').select('*').eq('edit_token', _ae_token).single();
  if (!res.data) return;
  _ae_artist = res.data;

  var r = await Promise.all([
    db.from('categories').select('*').order('name'),
    db.from('mods').select('*').order('name'),
    db.from('championships').select('*').order('name'),
  ]);
  _cats = r[0].data||[]; _mods = r[1].data||[]; _champs = r[2].data||[];

  // Populate championship select
  var cs = document.getElementById('ae-champ');
  _champs.forEach(function(c){
    var o = document.createElement('option'); o.value = c.id; o.textContent = c.short_name||c.name; cs.appendChild(o);
  });

  // Init brand filter
  aeFilterCats();

  document.getElementById('ae-gate').style.display = 'none';
  document.getElementById('ae-shell').style.display = 'grid';

  var ini = _ae_artist.name.split(' ').map(function(w){return w[0]||'';}).join('').slice(0,2).toUpperCase();
  var av = document.getElementById('ae-av');
  if (_ae_artist.avatar_url) av.innerHTML = '<img src="'+_ae_artist.avatar_url+'">';
  else av.textContent = ini;
  document.getElementById('ae-name').textContent = _ae_artist.name;

  aeNav('liveries');
}

// LIVERIES
async function aeLiveries() {
  var el = document.getElementById('ae-liveries-grid');
  el.innerHTML = '<div style="padding:40px;text-align:center;color:var(--t2);">Loading…</div>';
  var res = await db.from('liveries').select('*,categories(name),mods(name),championships(short_name)').eq('artist_id',_ae_artist.id).order('created_at',{ascending:false});
  var data = res.data||[];
  if (!data.length) {
    el.innerHTML = '<div style="padding:60px;text-align:center;color:var(--t2);"><i class="ti ti-photo" style="font-size:32px;display:block;margin-bottom:12px;color:var(--t3);"></i>No liveries yet.<br><br><button onclick="aeNav(\'submit\')" style="margin-top:8px;height:38px;padding:0 18px;background:var(--acc);color:#fff;border:none;border-radius:9px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;"><i class="ti ti-plus"></i> Add your first livery</button></div>';
    return;
  }
  el.innerHTML = data.map(function(l){
    return '<div class="lv-card">'
      +'<div class="lv-thumb">'+(l.image_url?'<img src="'+l.image_url+'" loading="lazy">':'<i class="ti ti-photo" style="font-size:24px;color:var(--t3);"></i>')
      +'<div class="lv-ov"></div>'
      +'<div class="lv-badges"><span class="badge '+(l.approved?'b-f':'b-n')+'">'+(l.approved?'Published':'Pending')+'</span></div>'
      +(l.car_number?'<div class="lv-num">#'+l.car_number+'</div>':'')
      +'</div>'
      +'<div class="lv-body">'
      +(l.championships?.short_name?'<div style="font-size:9px;font-weight:700;color:var(--acc);text-transform:uppercase;letter-spacing:.4px;margin-bottom:3px;">'+l.championships.short_name+'</div>':'')
      +'<div class="lv-name">'+l.name+'</div>'
      +'<div class="lv-foot"><span style="font-size:10px;color:var(--t2);">'+(l.mods?.name||'—')+'</span>'
      +'<button class="btn-ghost" style="height:26px;padding:0 10px;font-size:11px;" onclick="aeEditLivery(\''+l.id+'\')">Edit</button>'
      +'</div></div></div>';
  }).join('');
}

// EDIT LIVERY MODAL
async function aeEditLivery(id) {
  _ae_edit_id = id;
  var res = await db.from('liveries').select('*').eq('id',id).single();
  var l = res.data; if (!l) return;
  document.getElementById('ae-lm-name').value = l.name||'';
  document.getElementById('ae-lm-team').value = l.team||'';
  document.getElementById('ae-lm-driver').value = l.driver||'';
  document.getElementById('ae-lm-season').value = l.season||'';
  document.getElementById('ae-lm-car').value = l.car_number||'';
  document.getElementById('ae-lm-paid').value = l.is_paid?'true':'false';
  document.getElementById('ae-lm-notes').value = l.notes||'';
  document.getElementById('ae-lm-ov').classList.add('open');
}

document.getElementById('ae-lm-cancel').addEventListener('click', function(){ document.getElementById('ae-lm-ov').classList.remove('open'); });
document.getElementById('ae-lm-ov').addEventListener('click', function(e){ if(e.target===this) this.classList.remove('open'); });
document.getElementById('ae-lm-save').addEventListener('click', async function(){
  var name = document.getElementById('ae-lm-name').value.trim();
  if (!name){ aeToast('Name required','err'); return; }
  var payload = {
    name: name,
    team: document.getElementById('ae-lm-team').value.trim()||null,
    driver: document.getElementById('ae-lm-driver').value.trim()||null,
    season: document.getElementById('ae-lm-season').value.trim()||null,
    car_number: document.getElementById('ae-lm-car').value.trim()||null,
    is_paid: document.getElementById('ae-lm-paid').value==='true',
    notes: document.getElementById('ae-lm-notes').value.trim()||null,
  };
  var res = await db.rpc('artist_update_livery',{p_token:_ae_token,p_livery_id:_ae_edit_id,p_data:payload});
  if (res.error){ aeToast('Error: '+res.error.message,'err'); return; }
  document.getElementById('ae-lm-ov').classList.remove('open');
  aeToast('Saved!'); aeLiveries();
});
document.getElementById('ae-lm-delete').addEventListener('click', async function(){
  if (!confirm('Delete this livery?')) return;
  await db.from('liveries').delete().eq('id',_ae_edit_id);
  document.getElementById('ae-lm-ov').classList.remove('open');
  aeToast('Deleted.'); aeLiveries();
});

// ADDONS
async function aeAddons() {
  var el = document.getElementById('ae-addons-grid');
  el.innerHTML = '<div style="padding:40px;text-align:center;color:var(--t2);">Loading…</div>';
  var res = await db.from('addons').select('*,categories(name),mods(name)').eq('artist_id',_ae_artist.id).order('created_at',{ascending:false});
  var data = res.data||[];
  if (!data.length){ el.innerHTML='<div style="padding:60px;text-align:center;color:var(--t2);"><i class="ti ti-puzzle" style="font-size:32px;display:block;margin-bottom:12px;color:var(--t3);"></i>No addons yet.</div>'; return; }
  el.innerHTML = data.map(function(a){
    return '<div class="lv-card"><div class="lv-thumb">'+(a.image_url?'<img src="'+a.image_url+'" loading="lazy">':'<i class="ti ti-puzzle" style="font-size:24px;color:var(--t3);"></i>')
      +'<div class="lv-ov"></div><div class="lv-badges"><span class="badge '+(a.approved?'b-f':'b-n')+'">'+(a.approved?'Published':'Pending')+'</span></div>'
      +'</div><div class="lv-body"><div class="lv-name">'+a.name+'</div>'
      +'<div class="lv-foot"><span style="font-size:10px;color:var(--t2);">'+(a.categories?.name||'—')+'</span>'
      +'<span class="badge '+(a.is_paid?'b-p':'b-f')+'">'+(a.is_paid?'Paid':'Free')+'</span>'
      +'</div></div></div>';
  }).join('');
}

// SUBMIT
function aeInitSubmit() {
  // Already populated on boot — just clear form
  document.getElementById('ae-lname').value = '';
  document.getElementById('ae-team').value = '';
  document.getElementById('ae-driver').value = '';
  document.getElementById('ae-season').value = '';
  document.getElementById('ae-carnumber').value = '';
  document.getElementById('ae-url').value = '';
  document.getElementById('ae-img').value = '';
  document.getElementById('ae-notes').value = '';
  document.getElementById('ae-paid').value = 'false';
  document.getElementById('ae-cat').value = '';
  document.getElementById('ae-mod').value = '';
  document.getElementById('ae-champ').value = '';
  document.getElementById('ae-submit-err').style.display = 'none';
}

document.getElementById('ae-submit-btn').addEventListener('click', async function(){
  var name = document.getElementById('ae-lname').value.trim();
  var url = document.getElementById('ae-url').value.trim();
  if (!name){ document.getElementById('ae-submit-err').textContent='Livery name required.'; document.getElementById('ae-submit-err').style.display='block'; return; }
  if (!url){ document.getElementById('ae-submit-err').textContent='Download URL required.'; document.getElementById('ae-submit-err').style.display='block'; return; }
  var payload = {
    name: name,
    team: document.getElementById('ae-team').value.trim()||null,
    driver: document.getElementById('ae-driver').value.trim()||null,
    season: document.getElementById('ae-season').value.trim()||null,
    car_number: document.getElementById('ae-carnumber').value.trim()||null,
    category_id: document.getElementById('ae-cat').value||null,
    mod_id: document.getElementById('ae-mod').value||null,
    championship_id: document.getElementById('ae-champ').value||null,
    download_url: url,
    image_url: document.getElementById('ae-img').value.trim()||null,
    is_paid: document.getElementById('ae-paid').value==='true',
    notes: document.getElementById('ae-notes').value.trim()||null,
    artist_id: _ae_artist.id,
    author: _ae_artist.name,
    approved: true,
  };
  var res = await db.rpc('artist_submit_livery',{p_token:_ae_token,p_data:payload});
  if (res.error){ document.getElementById('ae-submit-err').textContent='Error: '+res.error.message; document.getElementById('ae-submit-err').style.display='block'; return; }
  aeToast('Livery published!');
  aeNav('liveries');
});

// PROFILE
function aeProfile() {
  if (!_ae_artist) return;
  document.getElementById('pf-name').value = _ae_artist.name||'';
  document.getElementById('pf-discord').value = _ae_artist.discord||'';
  document.getElementById('pf-bio').value = _ae_artist.bio||'';
  document.getElementById('pf-twitter').value = _ae_artist.url_twitter||'';
  document.getElementById('pf-patreon').value = _ae_artist.url_patreon||'';
  document.getElementById('pf-youtube').value = _ae_artist.url_youtube||'';
  document.getElementById('pf-overtake').value = _ae_artist.url_overtake||'';
}

document.getElementById('pf-save').addEventListener('click', async function(){
  var name = document.getElementById('pf-name').value.trim();
  if (!name){ aeToast('Name required','err'); return; }
  var payload = {
    name: name,
    discord: document.getElementById('pf-discord').value.trim()||null,
    bio: document.getElementById('pf-bio').value.trim()||null,
    url_twitter: document.getElementById('pf-twitter').value.trim()||null,
    url_patreon: document.getElementById('pf-patreon').value.trim()||null,
    url_youtube: document.getElementById('pf-youtube').value.trim()||null,
    url_overtake: document.getElementById('pf-overtake').value.trim()||null,
  };
  var res = await db.rpc('artist_update_profile',{p_token:_ae_token,p_data:payload});
  if (res.error){ aeToast('Error: '+res.error.message,'err'); return; }
  Object.assign(_ae_artist, payload);
  document.getElementById('ae-name').textContent = _ae_artist.name;
  aeToast('Profile saved!');
});

// START
if (_ae_token) aeBoot();
</script>
